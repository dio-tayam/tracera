<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="8" fill="#2563EB"/>
  <!-- outer ring -->
  <circle cx="16" cy="16" r="9.5" stroke="white" stroke-width="1.8" fill="none" opacity="0.6"/>
  <!-- middle ring -->
  <circle cx="16" cy="16" r="6" stroke="white" stroke-width="1.8" fill="none" opacity="0.85"/>
  <!-- center dot -->
  <circle cx="16" cy="16" r="2.5" fill="white"/>
  <!-- crosshair top -->
  <line x1="16" y1="4" x2="16" y2="8.5" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <!-- crosshair bottom -->
  <line x1="16" y1="23.5" x2="16" y2="28" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <!-- crosshair left -->
  <line x1="4" y1="16" x2="8.5" y2="16" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <!-- crosshair right -->
  <line x1="23.5" y1="16" x2="28" y2="16" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
</svg>
